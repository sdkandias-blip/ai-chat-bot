<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindEase AI - Teman Ceritamu</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Custom Scrollbar agar lebih rapi */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Animasi */
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animasi titik-titik saat AI mengetik */
        .typing-dot {
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-teal-50 via-cyan-50 to-blue-100 min-h-screen flex items-center justify-center p-4">
    
    <!-- Wadah Utama Chat (Efek Kaca/Glassmorphism) -->
    <div class="w-full max-w-lg bg-white/80 backdrop-blur-xl shadow-2xl shadow-teal-900/10 rounded-3xl overflow-hidden border border-white/50 flex flex-col h-[85vh]">
        
        <!-- Header -->
        <div class="bg-gradient-to-r from-teal-500 to-cyan-600 p-5 text-white flex items-center justify-between shadow-md z-10">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center border border-white/40">
                    <i class="fa-solid fa-leaf text-xl"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight">MindEase AI</h1>
                    <p class="text-xs text-teal-100 flex items-center gap-1">
                        <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> Online
                    </p>
                </div>
            </div>
            <button onclick="clearChat()" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 flex items-center justify-center transition-colors" title="Bersihkan Chat">
                <i class="fa-solid fa-rotate-right text-sm"></i>
            </button>
        </div>

        <!-- Area Chat -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-5 space-y-5 bg-transparent">
            
            <!-- Pesan Pembuka AI -->
            <div class="flex items-start gap-3 fade-in-up">
                <div class="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center flex-shrink-0 border border-teal-200">
                    <i class="fa-solid fa-robot text-teal-600 text-sm"></i>
                </div>
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 max-w-[80%] text-gray-700 text-sm">
                    <p>Halo! Saya <b>MindEase</b>, asisten kesehatan mental virtual kamu. 🌱</p>
                    <p class="mt-2">Ada yang membebani pikiranmu hari ini? Ceritakan saja, aku siap mendengarkan.</p>
                    
                    <!-- Tombol Rekomendasi Pertanyaan (Sesuai tugas) -->
                    <div class="mt-3 flex flex-wrap gap-2" id="quick-prompts">
                        <button onclick="usePrompt('Aku merasa sangat lelah dan stres dengan pekerjaanku hari ini.')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">
                            Stres Pekerjaan
                        </button>
                        <button onclick="usePrompt('Bantu aku mengatur nafas agar lebih tenang.')" class="text-xs bg-teal-50 text-teal-700 border border-teal-200 px-3 py-1.5 rounded-full hover:bg-teal-100 transition">
                            Latihan Pernapasan
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <!-- Area Input -->
        <div class="p-4 bg-white/90 border-t border-teal-100/50 backdrop-blur-md">
            <div class="flex gap-2 items-end">
                <div class="flex-1 bg-gray-50 border border-gray-200 rounded-2xl flex items-center px-4 py-1 focus-within:border-teal-400 focus-within:ring-2 focus-within:ring-teal-100 transition-all">
                    <input type="text" id="user-input" class="w-full bg-transparent py-2 outline-none text-sm text-gray-700 placeholder-gray-400" placeholder="Ketik pesanmu di sini..." onkeypress="if(event.key==='Enter') handleSend()">
                </div>
                <button onclick="handleSend()" class="w-12 h-11 bg-teal-500 hover:bg-teal-600 text-white rounded-2xl flex items-center justify-center shadow-lg shadow-teal-500/30 transition-transform active:scale-95 flex-shrink-0">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-[10px] text-gray-400">Powered by Google Gemini 2.5 Flash</span>
            </div>
        </div>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        // Fungsi jika tombol rekomendasi ditekan
        function usePrompt(text) {
            userInput.value = text;
            handleSend();
        }

        // Fungsi untuk menambahkan pesan ke layar
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = sender === 'user' 
                ? 'flex items-end justify-end gap-2 fade-in-up' 
                : 'flex items-start gap-3 fade-in-up';

            if (sender === 'user') {
                msgDiv.innerHTML = `
                    <div class="bg-teal-600 text-white p-3 rounded-2xl rounded-br-none shadow-md max-w-[80%] text-sm">
                        ${text}
                    </div>
                    <div class="w-6 h-6 rounded-full bg-gray-200 flex items-center justify-center flex-shrink-0 overflow-hidden border border-gray-300">
                        <i class="fa-solid fa-user text-gray-500 text-[10px]"></i>
                    </div>
                `;
            } else {
                // Memformat teks tebal dari Gemini (Markdown **teks** menjadi HTML <b>teks</b>)
                const formattedText = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center flex-shrink-0 border border-teal-200 shadow-sm">
                        <i class="fa-solid fa-robot text-teal-600 text-sm"></i>
                    </div>
                    <div class="bg-white p-3.5 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 max-w-[80%] text-gray-700 text-sm leading-relaxed">
                        ${formattedText}
                    </div>
                `;
            }
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Animasi "Mengetik..."
        function showTypingIndicator() {
            const typingMsg = document.createElement('div');
            typingMsg.id = 'typing-indicator';
            typingMsg.className = 'flex items-start gap-3 fade-in-up';
            typingMsg.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center flex-shrink-0 border border-teal-200">
                    <i class="fa-solid fa-robot text-teal-600 text-sm"></i>
                </div>
                <div class="bg-white p-4 rounded-2xl rounded-tl-none shadow-sm border border-gray-100 flex gap-1 items-center">
                    <div class="w-2 h-2 bg-teal-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-teal-400 rounded-full typing-dot"></div>
                    <div class="w-2 h-2 bg-teal-400 rounded-full typing-dot"></div>
                </div>
            `;
            chatBox.appendChild(typingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        // Logika Utama Mengirim Pesan ke API
        async function handleSend() {
            const message = userInput.value.trim();
            if (!message) return;

            // Hapus tombol rekomendasi jika ada
            const promptsDiv = document.getElementById('quick-prompts');
            if(promptsDiv) promptsDiv.style.display = 'none';

            // 1. Tampilkan pesan user
            appendMessage('user', message);
            userInput.value = '';

            // 2. Tampilkan animasi mengetik
            showTypingIndicator();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });

                const data = await response.json();
                removeTypingIndicator();
                appendMessage('assistant', data.reply || 'Maaf, saya tidak menerima respons dari server.');

            } catch (error) {
                removeTypingIndicator();
                console.error(error);
                appendMessage('assistant', 'Terjadi kesalahan saat memuat jawaban. Silakan coba lagi.');
            }
        }

        // Fungsi reset chat
        function clearChat() {
            chatBox.innerHTML = `
                <div class="text-center mt-10 fade-in-up">
                    <i class="fa-regular fa-comments text-4xl text-teal-200 mb-3"></i>
                    <p class="text-gray-400 text-sm italic">Ruang obrolan telah dibersihkan.<br>Mulai percakapan baru!</p>
                </div>
            `;
        }
    </script>
</body>
</html>
